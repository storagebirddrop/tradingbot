services:
  # Paper Trading Bot
  bot-paper:
    image: ${IMAGE:-ghcr.io/${GITHUB_REPOSITORY}:latest}
    container_name: phemex-bot-paper
    restart: unless-stopped
    stop_grace_period: 60s
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - PROFILE=local_paper
      - BOT_ENCRYPTION_KEY=${BOT_ENCRYPTION_KEY:-}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./state:/app/state
    command: python3 -m src.run_bot --profile local_paper
    profiles:
      - paper

  # Testnet Trading Bot
  bot-testnet:
    image: ${IMAGE:-ghcr.io/${GITHUB_REPOSITORY}:latest}
    container_name: phemex-bot-testnet
    restart: unless-stopped
    stop_grace_period: 60s
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - PROFILE=phemex_testnet
      - PHEMEX_API_KEY=${PHEMEX_API_KEY}
      - PHEMEX_API_SECRET=${PHEMEX_API_SECRET}
      - ENABLE_TESTNET_TRADING=${ENABLE_TESTNET_TRADING:-NO}
      - BOT_ENCRYPTION_KEY=${BOT_ENCRYPTION_KEY:-}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./state:/app/state
    command: python3 -m src.run_bot --profile phemex_testnet
    profiles:
      - testnet

  # Live Trading Bot
  bot-live:
    image: ${IMAGE:-ghcr.io/${GITHUB_REPOSITORY}:latest}
    container_name: phemex-bot-live
    restart: unless-stopped
    stop_grace_period: 60s
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - PROFILE=phemex_live
      - PHEMEX_API_KEY=${PHEMEX_API_KEY}
      - PHEMEX_API_SECRET=${PHEMEX_API_SECRET}
      - ENABLE_LIVE_TRADING=${ENABLE_LIVE_TRADING:-NO}
      - BOT_ENCRYPTION_KEY=${BOT_ENCRYPTION_KEY:-}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./state:/app/state
    command: python3 -m src.run_bot --profile phemex_live
    profiles:
      - live

networks:
  default:
    name: phemex-bot-network
